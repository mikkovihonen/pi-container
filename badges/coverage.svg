<svg xmlns="http://www.w3.org/2000/svg" width="114" height="20" role="img" aria-label="coverage: 91%">
  <title>coverage: 91%</title>
  <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="114" height="20" rx="3"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="76" height="20" fill="#555"/>
    <rect x="76" width="38" height="20" fill="#4c1"/>
    <rect width="114" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text x="380" y="150" fill-opacity=".8" filter="url(#blur)">coverage</text>
        <text x="380" y="150" fill-opacity=".3" textLength="530">coverage</text>
      </g>
      <text x="380" y="140" textLength="530">coverage</text>
    </g>
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text x="950" y="150" fill-opacity=".8" filter="url(#blur)">91%</text>
        <text x="950" y="150" fill-opacity=".3" textLength="280">91%</text>
      </g>
      <text x="950" y="140" textLength="280">91%</text>
    </g>
  </g>
</svg>