# Transient path mounts for the pi-coding-agent container.
# Each path listed here is mounted as a tmpfs (volatile RAM disk) inside the
# container at the same absolute path. Data in these paths is lost when the
# container stops. Use it for build artifacts, caches, or anything you do NOT
# want written back to your workspace on the host.
#
# All paths must live under /workspace (your project, mounted read-write).
#
# Example:
#   paths:
#     - /workspace/node_modules/.cache
#     - /workspace/target
#     - /workspace/.pytest_cache
paths: []
