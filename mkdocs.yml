site_name: pi-container
site_description: A containerized environment for running the pi-coding-agent with local LLM inference and full auditability
site_url: https://mikkovihonen.github.io/pi-container

repo_name: mikkovihonen/pi-container
repo_url: https://github.com/mikkovihonen/pi-container

theme:
  name: material
  logo: assets/pi-container-logo.svg
  favicon: assets/png/pi-container-32.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Development: development.md
  - Releases: releases.md
  - Proxy & addons:
      - Overview: proxy/overview.md
      - Allowlist: proxy/allowlist.md
      - Token Replacer: proxy/token-replacer.md
      - Flow Export: proxy/flow-export.md
      - Addon Development: proxy/addon-development.md
