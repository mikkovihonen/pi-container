# Per-project pi-container configuration (seeded on first run; edit per workspace).
#
# This is the single source of truth for orchestration settings. The proxy addon
# configs (allowlist.yaml, token_replacer.yaml) and chat templates live in their
# own files/dirs alongside this one.
#
# schema_version: Bumped whenever the template changes (new fields, changed types,
# removed fields, new files in default/). The launch fails if this does not match
# the pi-container version (the latest git tag). Delete .pi-container to re-seed.
schema_version: "0.1.6"

# Container resource limits. A null/omitted value means "no limit".
resources:
  agent:
    memory: 4g
    cpus: 2
  proxy:
    memory: 4g
    cpus: 2

# llama-server startup tuning (seconds to wait for /health; relaunch attempts).
llama:
  startup_timeout: 180
  startup_attempts: 2

# Network settings for this project's isolated stack.
network:
  ipv6: false
  dns: "1.1.1.1"

# Proxy container options. expose_ui: localhost (127.0.0.1 only) | lan (0.0.0.0).
proxy:
  expose_ui: localhost

# Extra agent-container env vars / bind mounts (absolute host paths).
agent:
  env: {}
  mounts: []

# Transient tmpfs mounts inside the agent container (volatile; lost on stop).
# These shadow this repo's own build/runtime artifacts so the agent works against
# clean, empty dirs rather than the host's caches/locks/models.
tmpfs:
  paths:
    - /workspace/.venv
    - /workspace/.pytest_cache
    - /workspace/.ruff_cache
    - /workspace/src/__pycache__
    - /workspace/llama-server/.locks
    - /workspace/llama-server/logs
    - /workspace/llama-server/models
    - /workspace/pi-coding-agent-proxy/.locks
    - /workspace/pi-coding-agent-proxy/.pytest_cache
    - /workspace/pi-coding-agent-proxy/__pycache__
    - /workspace/pi-coding-agent-proxy/addons/allowlist/.pytest_cache
    - /workspace/pi-coding-agent-proxy/addons/allowlist/__pycache__
    - /workspace/pi-coding-agent-proxy/addons/token_replacer/.pytest_cache
    - /workspace/pi-coding-agent-proxy/addons/token_replacer/__pycache__

# mitmweb flow export — capture this repo's own HTTP/HTTPS history for auditing.
flow_export:
  enabled: false

# Proxy egress policy — deny-all except the inspected HTTP/HTTPS/DNS.
egress:
  allow:
    ssh: false
    smtp: false
    git: false
    ntp: false
    tcp_ports: []
    udp_ports: []
