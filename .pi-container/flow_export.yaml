# Per-project mitmweb flow export.
#
# When enabled, the proxy's captured HTTP/HTTPS flow history for this workspace
# is exported after the agent shuts down, bucketed by UTC date under
# .pi-container/exports/flows/<YYYY-MM-DD>/<HH-MM-SS-mmm>_<session-id>.json
#
# The export contains full request/response bodies and headers (including any
# secrets the token_replacer did not redact) — treat .pi-container/exports/ as
# sensitive and keep it out of version control.
enabled: true
